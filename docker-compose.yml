services:
  postgres:
    image: postgres:16-alpine
    container_name: padel-topfly-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: padel_topfly
    ports:
      - "5432:5432"
    volumes:
      - padel_topfly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d padel_topfly"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  padel_topfly_pgdata:
