name: Deploy Preview Test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://padel:padel@localhost:5432/padel_topfly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate

  deploy:
    name: Deploy test app to Lightsail
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci

    steps:
      - name: Validate configuration
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for name in LIGHTSAIL_HOST LIGHTSAIL_SSH_PRIVATE_KEY LIGHTSAIL_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure SSH
        id: configure_ssh
        shell: bash
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_PRIVATE_KEY}" > ~/.ssh/lightsail_deploy_key
          printf '%s\n' "${LIGHTSAIL_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail_deploy_key ~/.ssh/known_hosts

      - name: Remote diagnostics
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly
          echo "Remote host: $(hostname)"
          sudo docker version
          sudo docker compose -f docker-compose.production.yml ps || true
          REMOTE

      - name: Update remote checkout
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly

          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          echo "Remote commit for preview: $(git rev-parse --short HEAD)"
          REMOTE

      - name: Start preview database
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly

          sudo docker compose -f docker-compose.production.yml up -d postgres_preview
          for attempt in $(seq 1 30); do
            if sudo docker compose -f docker-compose.production.yml exec -T postgres_preview \
              pg_isready -U padel_preview -d padel_topfly_preview; then
              echo "Preview database is ready"
              exit 0
            fi
            echo "Waiting for preview database (${attempt}/30)"
            sleep 2
          done

          sudo docker compose -f docker-compose.production.yml logs postgres_preview --tail=120
          exit 1
          REMOTE

      - name: Build preview app image
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly
          timeout 900 sudo docker compose -f docker-compose.production.yml build app_preview
          REMOTE

      - name: Start preview app and Caddy
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly

          sudo docker compose -f docker-compose.production.yml up -d app_preview caddy
          sudo docker compose -f docker-compose.production.yml exec -T app_preview \
            sh -lc 'grep -q "Content-Security-Policy" next.config.ts && echo "Preview security headers: present"' \
            < /dev/null
          sudo docker compose -f docker-compose.production.yml exec -T caddy \
            caddy validate --config /etc/caddy/Caddyfile \
            < /dev/null
          sudo docker compose -f docker-compose.production.yml ps
          REMOTE

      - name: Internal preview smoke test
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly

          for attempt in $(seq 1 36); do
            if sudo docker compose -f docker-compose.production.yml exec -T app_preview \
              node -e "fetch('http://127.0.0.1:3000').then(r => r.text()).then(t => process.exit(t.includes('TEST') ? 0 : 1)).catch(() => process.exit(1))"; then
              echo "Preview app responded with TEST marker"
              exit 0
            fi
            echo "Waiting for preview app (${attempt}/36)"
            sleep 5
          done

          sudo docker compose -f docker-compose.production.yml logs app_preview --tail=180
          exit 1
          REMOTE

      - name: Collect preview logs on failure
        if: failure() && steps.configure_ssh.outcome == 'success'
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"
          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" \
            'cd /opt/padel-topfly && sudo docker compose -f docker-compose.production.yml logs app_preview caddy --tail=160'

      - name: Preview health check
        shell: bash
        run: |
          set -euo pipefail

          if ! getent hosts padel-test.topflysolutions.com > /tmp/padel-preview-hosts.txt; then
            echo "::warning::padel-test.topflysolutions.com does not resolve yet. Internal preview smoke test passed; retry public check after DNS propagation."
            exit 0
          fi

          if ! curl --fail --silent --show-error --location --retry 18 --retry-delay 10 \
            https://padel-test.topflysolutions.com > /tmp/padel-preview.html; then
            echo "::warning::Preview DNS resolves, but HTTPS is not ready yet. Internal preview smoke test passed; retry after Caddy obtains the certificate."
            exit 0
          fi

          grep -q 'TEST' /tmp/padel-preview.html

          headers="$(curl --fail --silent --show-error --head https://padel-test.topflysolutions.com)"
          printf '%s\n' "${headers}" | grep -qi '^content-security-policy:'
          printf '%s\n' "${headers}" | grep -qi '^x-content-type-options: nosniff'
          printf '%s\n' "${headers}" | grep -qi '^x-frame-options: DENY'
          printf '%s\n' "${headers}" | grep -qi '^referrer-policy: strict-origin-when-cross-origin'
          printf '%s\n' "${headers}" | grep -qi '^permissions-policy:'

          if printf '%s\n' "${headers}" | grep -qi '^x-powered-by:'; then
            echo "::error::Preview still exposes X-Powered-By"
            exit 1
          fi
