name: Recover Pending Signature Migration

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip app image build and use the image already present on the server"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  recover:
    name: Resolve failed migration and restart app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate configuration
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for name in LIGHTSAIL_HOST LIGHTSAIL_SSH_PRIVATE_KEY LIGHTSAIL_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure SSH
        shell: bash
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_PRIVATE_KEY}" > ~/.ssh/lightsail_deploy_key
          printf '%s\n' "${LIGHTSAIL_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail_deploy_key ~/.ssh/known_hosts

      - name: Resolve and deploy
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          RECOVERY_SKIP_BUILD: ${{ inputs.skip_build }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -o ConnectTimeout=30 -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" \
            "RECOVERY_SKIP_BUILD=${RECOVERY_SKIP_BUILD} bash -s" <<'REMOTE'
          set -euo pipefail

          cd /opt/padel-topfly
          echo "Remote host: $(hostname)"

          BACKUP_DIR="/var/backups/padel-topfly"
          sudo install -d -m 750 -o "$(whoami)" -g "$(id -gn)" "${BACKUP_DIR}"

          if sudo docker compose -f docker-compose.production.yml ps --services --filter "status=running" | grep -qx postgres; then
            sudo docker compose -f docker-compose.production.yml exec -T postgres \
              pg_dump -U padel -d padel_topfly \
              > "${BACKUP_DIR}/padel_topfly_recover_pending_signatures_$(date +%Y%m%d-%H%M%S).sql" < /dev/null
          else
            echo "::error::Postgres is not running; aborting recovery."
            exit 1
          fi

          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          echo "Remote commit: $(git rev-parse --short HEAD)"

          sudo docker compose -f docker-compose.production.yml stop app < /dev/null || true
          if [ "${RECOVERY_SKIP_BUILD}" = "true" ]; then
            echo "Skipping app image build; using the image already present on the server."
          else
            sudo docker compose -f docker-compose.production.yml build app < /dev/null
          fi

          unresolved_failed_migration_count="$(
            sudo docker compose -f docker-compose.production.yml exec -T postgres \
              psql -U padel -d padel_topfly -Atc \
              "SELECT count(*) FROM _prisma_migrations WHERE migration_name = '20260626090000_pending_signature_bookings' AND finished_at IS NULL AND rolled_back_at IS NULL;" \
              < /dev/null
          )"

          if [ "${unresolved_failed_migration_count}" != "0" ]; then
            sudo docker compose -f docker-compose.production.yml run -T --rm --no-deps app \
              npx prisma migrate resolve --rolled-back 20260626090000_pending_signature_bookings \
              < /dev/null
          else
            echo "No unresolved failed pending-signature migration found; continuing."
          fi

          sudo docker compose -f docker-compose.production.yml run -T --rm --no-deps app \
            npx prisma migrate deploy \
            < /dev/null

          sudo docker compose -f docker-compose.production.yml up -d --no-deps app < /dev/null
          sudo docker compose -f docker-compose.production.yml restart caddy < /dev/null

          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error \
              --resolve padel.topflysolutions.com:443:127.0.0.1 \
              https://padel.topflysolutions.com > /dev/null; then
              echo "Production health check passed on attempt ${attempt}."
              break
            fi

            if [ "${attempt}" = "24" ]; then
              echo "::error::Production health check failed after recovery."
              sudo docker compose -f docker-compose.production.yml ps
              sudo docker compose -f docker-compose.production.yml logs app --tail=160
              exit 1
            fi

            sleep 5
          done

          sudo docker compose -f docker-compose.production.yml ps
          REMOTE
