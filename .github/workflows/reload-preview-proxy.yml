name: Reload Preview Proxy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-proxy-reload
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reload:
    name: Reload Caddy preview route
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate configuration
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for name in LIGHTSAIL_HOST LIGHTSAIL_SSH_PRIVATE_KEY LIGHTSAIL_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure SSH
        shell: bash
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_PRIVATE_KEY}" > ~/.ssh/lightsail_deploy_key
          printf '%s\n' "${LIGHTSAIL_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail_deploy_key ~/.ssh/known_hosts

      - name: Reload Caddy on Lightsail
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key "${SSH_USER}@${LIGHTSAIL_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail

          cd /opt/padel-topfly
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          sudo docker compose -f docker-compose.production.yml exec -T caddy \
            caddy validate --config /etc/caddy/Caddyfile \
            < /dev/null
          sudo docker compose -f docker-compose.production.yml exec -T caddy \
            caddy reload --config /etc/caddy/Caddyfile \
            < /dev/null
          REMOTE

      - name: Public preview check
        shell: bash
        run: |
          set -euo pipefail

          if ! getent hosts padel-test.topflysolutions.com; then
            echo "::warning::padel-test.topflysolutions.com does not resolve from this runner yet."
            exit 0
          fi

          curl --fail --silent --show-error --location --retry 12 --retry-delay 10 \
            https://padel-test.topflysolutions.com > /tmp/padel-preview.html
          grep -q 'TEST' /tmp/padel-preview.html
