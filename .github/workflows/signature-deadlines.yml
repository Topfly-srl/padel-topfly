name: Signature Deadlines

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

concurrency:
  group: signature-deadlines
  cancel-in-progress: false

jobs:
  process:
    name: Process pending signatures
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call production deadline processor
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.APP_INTERNAL_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "APP_INTERNAL_CRON_SECRET is not configured." >&2
            exit 1
          fi

          response="$(curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            https://padel.topflysolutions.com/api/internal/signature-deadlines)"

          echo "Response: ${response}"

          # --fail gia' fa uscire curl su HTTP non 2xx; qui aggiungiamo il controllo sul corpo,
          # cosi' una 200 che non riporta ok:true fa comunque fallire la run in modo visibile.
          case "${response}" in
            *'"ok":true'*) ;;
            *)
              echo "Processor did not return ok:true" >&2
              exit 1
              ;;
          esac
