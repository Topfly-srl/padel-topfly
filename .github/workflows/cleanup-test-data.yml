name: Cleanup Test Data

# One-off: rimuove le prenotazioni di TEST del committente (organizzate da
# antony.buffone@topflysolutions.com o antonybuffone@gmail.com) cosi' da non comparire nelle
# statistiche admin, ed elimina i relativi eventi calendario Outlook. Protegge SEMPRE la
# prenotazione reale di gio 23/07/2026 22:00-00:00 Rome (UTC 20:00-22:00), esclusa per id
# esatto (cmrsb5o4n005gn72bcoe9gjx2), verificato dal dry-run.
#
# Sicurezza: apply=false (default) fa solo un DRY-RUN in sola lettura che stampa cosa verrebbe
# toccato. apply=true esegue davvero, ma prima fa un pg_dump di backup. WaiverSignature cascada
# sul delete della Booking. Da rimuovere dopo l'uso.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "false = solo dry-run in lettura; true = esegue backup + cancellazioni"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: read

jobs:
  cleanup:
    name: Purge test bookings and their Outlook events
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate configuration
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for name in LIGHTSAIL_HOST LIGHTSAIL_SSH_PRIVATE_KEY LIGHTSAIL_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure SSH
        shell: bash
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_PRIVATE_KEY}" > ~/.ssh/lightsail_deploy_key
          printf '%s\n' "${LIGHTSAIL_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail_deploy_key ~/.ssh/known_hosts

      - name: Cleanup over SSH
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          APPLY: ${{ inputs.apply }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"

          ssh -i ~/.ssh/lightsail_deploy_key \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o ConnectTimeout=20 \
            "${SSH_USER}@${LIGHTSAIL_HOST}" "APPLY=${APPLY} bash -s" <<'REMOTE'
          set -euo pipefail

          cd /opt/padel-topfly
          DC="sudo docker compose -f docker-compose.production.yml"
          PSQL="${DC} exec -T postgres psql -U padel -d padel_topfly"

          echo "Remote host: $(hostname)"
          echo "Modalita': APPLY=${APPLY}"
          echo ""

          echo "== TUTTE le prenotazioni antonybuffone (contesto) =="
          ${PSQL} <<'SQL'
          SELECT id, start, "end", status, "outlookEventId" IS NOT NULL AS has_event, "organizerEmail"
          FROM "Booking"
          WHERE "organizerEmail" IN ('antony.buffone@topflysolutions.com','antonybuffone@gmail.com')
          ORDER BY start;
          SQL

          echo ""
          echo "== PROTETTA (resta, NON viene toccata) =="
          ${PSQL} <<'SQL'
          SELECT id, start, "end", status, "organizerEmail"
          FROM "Booking"
          WHERE id = 'cmrsb5o4n005gn72bcoe9gjx2';
          SQL

          echo ""
          echo "== Verrebbero ELIMINATE (tutte le antonybuffone tranne la protetta) =="
          ${PSQL} <<'SQL'
          SELECT id, start, "end", status, "organizerEmail"
          FROM "Booking"
          WHERE "organizerEmail" IN ('antony.buffone@topflysolutions.com','antonybuffone@gmail.com')
            AND id <> 'cmrsb5o4n005gn72bcoe9gjx2'
          ORDER BY start;
          SQL

          if [ "${APPLY}" != "true" ]; then
            echo ""
            echo "DRY-RUN: nessuna modifica eseguita. Rilanciare con apply=true per eseguire."
            exit 0
          fi

          echo ""
          echo "== APPLY: backup pg_dump =="
          BACKUP_DIR=/var/backups/padel-topfly
          sudo install -d -m 750 -o "$(whoami)" -g "$(id -gn)" "${BACKUP_DIR}"
          ${DC} exec -T postgres pg_dump -U padel -d padel_topfly \
            > "${BACKUP_DIR}/pre_cleanup_$(date +%Y%m%d-%H%M%S).sql" < /dev/null
          echo "Backup creato in ${BACKUP_DIR}."

          echo ""
          echo "== APPLY: annullo eventi calendario Outlook (annulla e notifica) =="
          LIVE_EVENTS=$(${PSQL} -tA -c "SELECT \"outlookEventId\" FROM \"Booking\" WHERE \"organizerEmail\" IN ('antony.buffone@topflysolutions.com','antonybuffone@gmail.com') AND \"outlookEventId\" IS NOT NULL AND status IN ('CONFIRMED','PENDING_SIGNATURES') AND id <> 'cmrsb5o4n005gn72bcoe9gjx2';" < /dev/null)
          if [ -z "${LIVE_EVENTS}" ]; then
            echo "Nessun evento calendario vivo da annullare."
          else
            for eid in ${LIVE_EVENTS}; do
              ${DC} exec -T app node -e '(async()=>{const eid=process.argv[1];const b=new URLSearchParams({client_id:process.env.MS_GRAPH_CLIENT_ID,client_secret:process.env.MS_GRAPH_CLIENT_SECRET,scope:"https://graph.microsoft.com/.default",grant_type:"client_credentials"});const tr=await fetch(`https://login.microsoftonline.com/${process.env.MS_GRAPH_TENANT_ID}/oauth2/v2.0/token`,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:b});const tj=await tr.json();if(!tr.ok){console.log("TOKEN_FAIL",tr.status);process.exit(0);}const mb=process.env.MS_GRAPH_MAILBOX;const r=await fetch(`https://graph.microsoft.com/v1.0/users/${encodeURIComponent(mb)}/events/${encodeURIComponent(eid)}/cancel`,{method:"POST",headers:{Authorization:`Bearer ${tj.access_token}`,"Content-Type":"application/json"},body:JSON.stringify({comment:"Prenotazione di test rimossa."})});console.log("CANCEL status",r.status,"event",eid.slice(0,10)+"...");})();' "${eid}" < /dev/null || echo "Errore annullo evento ${eid} (ignoro, procedo)"
            done
          fi

          echo ""
          echo "== APPLY: elimino righe AuditLog delle prenotazioni target =="
          ${PSQL} <<'SQL'
          DELETE FROM "AuditLog"
          WHERE "entityType" = 'Booking'
            AND "entityId" IN (
              SELECT id FROM "Booking"
              WHERE "organizerEmail" IN ('antony.buffone@topflysolutions.com','antonybuffone@gmail.com')
                AND id <> 'cmrsb5o4n005gn72bcoe9gjx2'
            );
          SQL

          echo ""
          echo "== APPLY: elimino le prenotazioni target (WaiverSignature cascada) =="
          ${PSQL} <<'SQL'
          DELETE FROM "Booking"
          WHERE "organizerEmail" IN ('antony.buffone@topflysolutions.com','antonybuffone@gmail.com')
            AND id <> 'cmrsb5o4n005gn72bcoe9gjx2';
          SQL

          echo ""
          echo "== VERIFICA: prenotazioni antonybuffone rimaste (dovrebbe restare solo la 22:00) =="
          ${PSQL} <<'SQL'
          SELECT id, start, "end", status, "organizerEmail"
          FROM "Booking"
          WHERE "organizerEmail" IN ('antony.buffone@topflysolutions.com','antonybuffone@gmail.com')
          ORDER BY start;
          SQL

          echo ""
          echo "Cleanup completato."
          REMOTE
