name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://padel:padel@localhost:5432/padel_topfly

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Audit production dependencies
        run: npm audit --omit=dev

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://padel:padel@localhost:5432/padel_topfly

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: padel
          POSTGRES_PASSWORD: padel
          POSTGRES_DB: padel_topfly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U padel -d padel_topfly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Schema reale sul Postgres del service: le stesse migration che girano in produzione,
      # incluso l'indice UNIQUE parziale creato via SQL grezzo su cui si appoggia la dedup firme.
      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Integration tests
        run: npm run test:integration

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci, integration]
    if: github.event_name == 'workflow_dispatch' || vars.PRODUCTION_AUTO_DEPLOY == 'true'

    steps:
      - name: Validate configuration
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
          APP_INTERNAL_CRON_SECRET: ${{ secrets.APP_INTERNAL_CRON_SECRET }}
        run: |
          set -euo pipefail

          missing=0
          for name in LIGHTSAIL_HOST LIGHTSAIL_SSH_PRIVATE_KEY LIGHTSAIL_KNOWN_HOSTS APP_INTERNAL_CRON_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Configure SSH
        id: configure_ssh
        shell: bash
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_KNOWN_HOSTS: ${{ secrets.LIGHTSAIL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_PRIVATE_KEY}" > ~/.ssh/lightsail_deploy_key
          printf '%s\n' "${LIGHTSAIL_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail_deploy_key ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          APP_INTERNAL_CRON_SECRET: ${{ secrets.APP_INTERNAL_CRON_SECRET }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"
          CRON_SECRET_FOR_SSH="$(printf '%q' "${APP_INTERNAL_CRON_SECRET}")"

          # Keepalive: la fase TypeScript della build resta muta anche 10+ minuti e senza
          # pacchetti la connessione cade ("Broken pipe", visto il 22/07): i probe ogni 30s
          # tengono vivo il canale finche' il server risponde.
          ssh -i ~/.ssh/lightsail_deploy_key \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "${SSH_USER}@${LIGHTSAIL_HOST}" \
            "APP_INTERNAL_CRON_SECRET=${CRON_SECRET_FOR_SSH} bash -s" <<'REMOTE'
          set -euo pipefail

          cd /opt/padel-topfly
          echo "Remote host: $(hostname)"
          BACKUP_DIR="/var/backups/padel-topfly"
          sudo install -d -m 750 -o "$(whoami)" -g "$(id -gn)" "${BACKUP_DIR}"

          if sudo docker compose -f docker-compose.production.yml ps --services --filter "status=running" | grep -qx postgres; then
            sudo docker compose -f docker-compose.production.yml exec -T postgres \
              pg_dump -U padel -d padel_topfly \
              > "${BACKUP_DIR}/padel_topfly_$(date +%Y%m%d-%H%M%S).sql" < /dev/null
          else
            echo "Postgres is not running; skipping pre-deploy DB dump."
          fi

          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          echo "Remote commit: $(git rev-parse --short HEAD)"

          # Backup notturno: installa lo script in posizione stabile e il cron.
          # Idempotente: install e tee sovrascrivono a ogni deploy.
          sudo install -m 755 scripts/backup.sh /usr/local/bin/padel-backup.sh
          sudo tee /etc/cron.d/padel-backup >/dev/null <<'CRON'
          # Backup notturno Postgres Padel TOPFLY. Gestito dal deploy, non modificare a mano.
          # min ora * * * utente comando
          15 3 * * * root /usr/local/bin/padel-backup.sh >> /var/log/padel-backup.log 2>&1
          CRON
          sudo chmod 644 /etc/cron.d/padel-backup

          if [ -f .env.production ]; then
            cp -p .env.production "${BACKUP_DIR}/env.production.$(date +%Y%m%d-%H%M%S).bak"

            set_env_key() {
              key="$1"
              value="$2"

              # Niente sed sulla riga: APP_INTERNAL_CRON_SECRET ha valore arbitrario
              # e i caratteri | & \ romperebbero o corromperebbero la sostituzione
              # (| chiude il comando, & diventa l'intero match, \ introduce escape).
              # Togliamo la riga esistente con grep (la chiave non ha metacaratteri
              # regex) e riscriviamo il valore con printf %s, che non interpreta nulla.
              tmp="$(mktemp)"
              grep -v "^${key}=" .env.production > "${tmp}" || true
              printf '%s="%s"\n' "${key}" "${value}" >> "${tmp}"
              cat "${tmp}" > .env.production
              rm -f "${tmp}"
            }

            set_env_key APP_ENV production
            set_env_key APP_PUBLIC_ORIGIN https://padel.topflysolutions.com
            set_env_key APP_WAIVER_RECIPIENT_EMAIL padel@topflysolutions.com
            set_env_key APP_INTERNAL_CRON_SECRET "${APP_INTERNAL_CRON_SECRET}"
          fi

          sudo docker compose -f docker-compose.production.yml up -d --build --remove-orphans
          sudo docker compose -f docker-compose.production.yml restart caddy
          sudo docker compose -f docker-compose.production.yml exec -T app \
            sh -lc 'grep -q "Content-Security-Policy" next.config.ts && echo "Next security headers: present"' \
            < /dev/null
          sudo docker compose -f docker-compose.production.yml exec -T caddy \
            caddy validate --config /etc/caddy/Caddyfile \
            < /dev/null
          sudo docker compose -f docker-compose.production.yml ps
          REMOTE

      - name: Collect app logs on failure
        if: failure() && steps.configure_ssh.outcome == 'success'
        shell: bash
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail

          SSH_USER="${LIGHTSAIL_USER:-ubuntu}"
          ssh -i ~/.ssh/lightsail_deploy_key \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o ConnectTimeout=20 \
            "${SSH_USER}@${LIGHTSAIL_HOST}" \
            'cd /opt/padel-topfly && sudo docker compose -f docker-compose.production.yml logs app --tail=120'

      - name: Production health check
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error --location --retry 12 --retry-delay 5 \
            https://padel.topflysolutions.com > /dev/null

          headers="$(curl --fail --silent --show-error --head https://padel.topflysolutions.com)"
          printf '%s\n' "${headers}" | grep -qi '^content-security-policy:'
          printf '%s\n' "${headers}" | grep -qi '^x-content-type-options: nosniff'
          printf '%s\n' "${headers}" | grep -qi '^x-frame-options: DENY'
          printf '%s\n' "${headers}" | grep -qi '^referrer-policy: strict-origin-when-cross-origin'
          printf '%s\n' "${headers}" | grep -qi '^permissions-policy:'

          if printf '%s\n' "${headers}" | grep -qi '^x-powered-by:'; then
            echo "::error::Production still exposes X-Powered-By"
            exit 1
          fi

          api_headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null \
            "https://padel.topflysolutions.com/api/availability?date=$(date -u +%F)")"
          printf '%s\n' "${api_headers}" | grep -qi '^cache-control:.*no-store'
